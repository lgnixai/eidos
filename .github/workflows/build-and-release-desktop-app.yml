name: Build Desktop Apps

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20.18.0"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Tweak pnpm.cjs
        run: sed -i 's/\/usr\/bin\/env node/node/g' /c/Users/runneradmin/setup-pnpm/node_modules/.pnpm/pnpm@10.12.4/node_modules/pnpm/bin/pnpm.cjs
        shell: bash

      - name: Download and extract libsimple
        run: cd apps/desktop && node scripts/download-libsimple.cjs

      - name: Install dependencies
        run: pnpm install

      - name: Build application
        env:
          NODE_OPTIONS: "--max_old_space_size=8192"
        run: pnpm run build:desktop

      - name: Build without Signing
        run: pnpm run pkg:desktop

      - name: List dist-app contents
        run: Get-ChildItem -Path apps/desktop/dist-app -Force

      - name: Update Release (Windows)
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/desktop/dist-app/*.exe
            apps/desktop/dist-app/*.zip
            apps/desktop/dist-app/latest*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20.18.0"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Download and extract libsimple
        run: cd apps/desktop && node scripts/download-libsimple.cjs

      - name: Install dependencies
        run: pnpm install

      - name: Import Code-Signing Certificates
        uses: Apple-Actions/import-codesign-certs@v1
        with:
          p12-file-base64: ${{ secrets.MACOS_CERTIFICATE }}
          p12-password: ${{ secrets.MACOS_CERTIFICATE_PWD }}

      - name: Build application
        env:
          NODE_OPTIONS: "--max_old_space_size=8192"
        run: pnpm run build:desktop

      - name: Build and Sign
        env:
          APPLEID: ${{ secrets.APPLE_ID }}
          APPLEIDPASS: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLETEAMID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.MACOS_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: pnpm run pkg:desktop

      - name: List dist-app contents
        run: ls -la apps/desktop/dist-app

      - name: Update Release (macOS)
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/desktop/dist-app/*.dmg
            apps/desktop/dist-app/*.zip
            apps/desktop/dist-app/latest*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20.18.0"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Download and extract libsimple
        run: cd apps/desktop && node scripts/download-libsimple.cjs

      - name: Install dependencies
        run: pnpm install

      - name: Build application
        env:
          NODE_OPTIONS: "--max_old_space_size=4096"
        run: pnpm run build:desktop

      - name: Build AppImage
        run: pnpm run pkg:desktop

      - name: List dist-app contents
        run: ls -la apps/desktop/dist-app

      - name: Update Release (Linux)
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/desktop/dist-app/*.AppImage
            apps/desktop/dist-app/*.zip
            apps/desktop/dist-app/latest*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
