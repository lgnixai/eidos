name: Build Desktop Apps

on:
  push:
    tags:
      - "v*"

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20.18.0"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Download and extract libsimple
        run: cd apps/desktop && node scripts/download-libsimple.cjs

      - name: Install dependencies
        run: pnpm install

      - name: Build frontend application
        env:
          NODE_OPTIONS: "--max_old_space_size=8192"
        run: pnpm run build:desktop

      - name: Upload frontend build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: |
            apps/desktop/dist/
            apps/desktop/dist-electron/
          retention-days: 1

  build-platforms:
    runs-on: ${{ matrix.os }}
    needs: build-frontend
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows
            artifact_name: windows-artifacts
            list_command: Get-ChildItem -Path apps/desktop/dist-app -Force
            shell: bash
          - os: macos-13
            platform: macos-intel
            artifact_name: macos-intel-artifacts
            needs_codesign: true
            list_command: ls -la apps/desktop/dist-app
          - os: macos-14
            platform: macos-arm
            artifact_name: macos-arm-artifacts
            needs_codesign: true
            list_command: ls -la apps/desktop/dist-app
          - os: ubuntu-latest
            platform: linux
            artifact_name: linux-artifacts
            list_command: ls -la apps/desktop/dist-app
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20.18.0"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Tweak pnpm.cjs (Windows only)
        if: matrix.platform == 'windows'
        run: sed -i 's/\/usr\/bin\/env node/node/g' /c/Users/runneradmin/setup-pnpm/node_modules/.pnpm/pnpm@10.12.4/node_modules/pnpm/bin/pnpm.cjs
        shell: bash

      - name: Download and extract libsimple
        run: cd apps/desktop && node scripts/download-libsimple.cjs

      - name: Install dependencies
        run: pnpm install

      - name: Import Code-Signing Certificates (macOS only)
        if: matrix.needs_codesign == true
        uses: Apple-Actions/import-codesign-certs@v1
        with:
          p12-file-base64: ${{ secrets.MACOS_CERTIFICATE }}
          p12-password: ${{ secrets.MACOS_CERTIFICATE_PWD }}

      - name: Download frontend build artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: apps/desktop/

      - name: Build and Sign (${{ matrix.platform }})
        if: matrix.needs_codesign == true
        env:
          APPLEID: ${{ secrets.APPLE_ID }}
          APPLEIDPASS: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLETEAMID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.MACOS_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: pnpm run pkg:desktop

      - name: Build without Signing (${{ matrix.platform }})
        if: matrix.needs_codesign != true
        run: pnpm run pkg:desktop

      - name: List dist-app contents
        run: ${{ matrix.list_command }}

      - name: Upload ${{ matrix.platform }} artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: apps/desktop/dist-app/

  release:
    needs: [build-platforms]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts/

      - name: Setup Node.js for merging
        uses: actions/setup-node@v3
        with:
          node-version: "20.18.0"

      - name: Install yaml package
        run: npm install yaml

      - name: Merge macOS update files
        run: node scripts/merge-macos-updates.cjs ./artifacts

      - name: Update Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/windows-artifacts/*.exe
            ./artifacts/windows-artifacts/*.zip
            ./artifacts/macos-intel-artifacts/*.dmg
            ./artifacts/macos-intel-artifacts/*.zip
            ./artifacts/macos-arm-artifacts/*.dmg
            ./artifacts/macos-arm-artifacts/*.zip
            ./artifacts/linux-artifacts/*.AppImage
            ./artifacts/linux-artifacts/*.zip
            ./artifacts/*/*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
