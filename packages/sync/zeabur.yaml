apiVersion: zeabur.com/v1
kind: Template
metadata:
  name: Eidos Sync
spec:
  description: A deployment stack for Eidos sync services (Metastore, Pagestore, MinIO).
  # Optional: Add icons for a better look in the Zeabur marketplace
  # icon: <URL_TO_PROJECT_ICON>
  tags:
    - Backend
    - Storage
    - Synchronization
  variables:
    - key: PUBLIC_DOMAIN
      type: DOMAIN
      name: Pagestore Public Domain
      description: Choose a domain for the Pagestore service (leave empty for default zeabur.app domain).
  readme: |-
    # Eidos Sync

    This template deploys the necessary services for Eidos synchronization:

    *   **Metastore:** Handles metadata storage.
    *   **Pagestore:** Manages page data.
    *   **MinIO:** S3-compatible object storage backend.

    Configure the domain for the Pagestore service during deployment.
  services:
    - name: minio
      template: PREBUILT
      # icon: https://raw.githubusercontent.com/zeabur/service-icons/main/marketplace/minio.svg
      spec:
        source:
          image: minio/minio:latest
        command: ["server", "/data", "--console-address", ":9001"] # Explicitly set command and args
        ports:
          - id: s3api
            port: 9000
            type: HTTP # Use HTTP as it's likely the protocol clients (metastore, pagestore) use
          - id: console
            port: 9001
            type: HTTP # MinIO Console is HTTP
        volumes:
          - id: data
            dir: /data
        env:
          MINIO_ROOT_USER:
            default: minio
          MINIO_ROOT_PASSWORD:
            default: minio-secret
            # Consider making password a variable if needed: default: ${PASSWORD}
          MINIO_DEFAULT_BUCKETS:
            default: graft-primary
          # Expose host and port for other services to construct the URL
          MINIO_HOST:
            default: ${CONTAINER_HOSTNAME}
            expose: true
            readonly: true
          MINIO_PORT_S3API:
            default: ${S3API_PORT}
            expose: true
            readonly: true
        # Add instructions on how to access MinIO console if desired
        # instructions:
        #   - type: DOMAIN # Might need a separate domain variable for MinIO console
        #     title: MinIO Console Access
        #     content: # Logic to construct the console URL

    - name: metastore
      template: PREBUILT
      # icon: <URL_TO_METASTORE_ICON>
      spec:
        source:
          image: ghcr.io/orbitinghail/metastore:0.1.4
        ports:
          - id: api
            port: 3001
            type: HTTP
        env:
          AWS_ACCESS_KEY_ID:
            default: minio # Use the fixed credentials from MinIO service
          AWS_SECRET_ACCESS_KEY:
            default: minio-secret
          AWS_REGION:
            default: us-east-1 # Keep region or make variable if needed
          # Construct the MinIO endpoint URL using exposed variables from the minio service
          AWS_ENDPOINT:
            default: http://${MINIO_HOST}:${MINIO_PORT_S3API}
          RUST_BACKTRACE:
            default: "1"
          # Expose host and port for pagestore service using a non-conflicting prefix
          MS_HOST:
            default: ${CONTAINER_HOSTNAME}
            expose: true
            readonly: true
          MS_PORT_API:
            default: ${API_PORT}
            expose: true
            readonly: true

    - name: pagestore
      template: PREBUILT
      # icon: <URL_TO_PAGESTORE_ICON>
      domainKey: PUBLIC_DOMAIN # Link this service to the public domain variable
      spec:
        source:
          image: ghcr.io/orbitinghail/pagestore:0.1.4
        ports:
          - id: web # This port will be exposed via PUBLIC_DOMAIN
            port: 3000
            type: HTTP
        env:
          AWS_ACCESS_KEY_ID:
            default: minio
          AWS_SECRET_ACCESS_KEY:
            default: minio-secret
          AWS_REGION:
            default: us-east-1
          # Construct the MinIO endpoint URL using exposed variables from the minio service
          AWS_ENDPOINT:
            default: http://${MINIO_HOST}:${MINIO_PORT_S3API}
          # Construct the Metastore endpoint URL using renamed exposed variables
          PAGESTORE_METASTORE:
            default: http://${MS_HOST}:${MS_PORT_API}
          RUST_BACKTRACE:
            default: "1"
# Note: Zeabur handles networking between services automatically.
# The static IPs and custom bridge network from docker-compose are not needed here.
# Service discovery relies on environment variables like ${SERVICE_NAME_HOST}.
